name: Android Build (APK + AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "نوع البناء"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build Flutter Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Static analysis (informational only)
        run: flutter analyze || true

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json

      - name: Decode keystore
        if: ${{ github.event.inputs.build_type != 'debug' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/hajez-release.jks

      - name: Create key.properties
        if: ${{ github.event.inputs.build_type != 'debug' }}
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=hajez-release.jks
          EOF

      - name: Build release AAB
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: flutter build appbundle --release

      - name: Build release APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: flutter build apk --release

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: flutter build apk --debug

      - name: Upload AAB artifact
        if: ${{ github.event.inputs.build_type != 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: hajez-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload release APK artifact
        if: ${{ github.event.inputs.build_type != 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: hajez-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload debug APK artifact
        if: ${{ github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: hajez-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
